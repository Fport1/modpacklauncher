name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build && npx electron-builder --win --publish never
      - id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/ModpackLauncher*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build && npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          path: dist/ModpackLauncher*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build && npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/ModpackLauncher*.AppImage

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: dist-mac
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ModpackLauncher ${{ needs.build-windows.outputs.version }}
          files: dist/*
          generate_release_notes: false

      - name: Update update.json
        env:
          TOKEN: ${{ secrets.UPDATES_REPO_TOKEN }}
          VERSION: ${{ needs.build-windows.outputs.version }}
        run: |
          WIN_EXE="ModpackLauncher Setup ${VERSION}.exe"
          WIN_URL="https://github.com/Fport1/modpacklauncher/releases/download/v${VERSION}/${WIN_EXE// /.}"

          MAC_DMG=$(ls dist/ModpackLauncher*.dmg | head -1 | xargs basename)
          MAC_URL="https://github.com/Fport1/modpacklauncher/releases/download/v${VERSION}/${MAC_DMG// /.}"

          LINUX_APPIMAGE=$(ls dist/ModpackLauncher*.AppImage | head -1 | xargs basename)
          LINUX_URL="https://github.com/Fport1/modpacklauncher/releases/download/v${VERSION}/${LINUX_APPIMAGE// /.}"

          JSON=$(jq -n \
            --arg version "$VERSION" \
            --arg win32 "$WIN_URL" \
            --arg darwin "$MAC_URL" \
            --arg linux "$LINUX_URL" \
            '{version: $version, releaseNotes: "Nueva version disponible.", date: (now | strftime("%Y-%m-%d")), files: {win32: $win32, darwin: $darwin, linux: $linux}}')

          EXISTING=$(curl -s -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/Fport1/modpacklauncher-updates/contents/update.json)
          SHA=$(echo "$EXISTING" | jq -r '.sha')

          CONTENT=$(echo "$JSON" | base64 -w 0)

          curl -s -X PUT \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Fport1/modpacklauncher-updates/contents/update.json \
            -d "{\"message\":\"Update to v${VERSION}\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\"}"
